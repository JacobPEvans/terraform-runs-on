name: CI Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - '**.tf'
              - '**.tfvars'
              - '.terraform.lock.hcl'
              - 'terragrunt.hcl'

  validate:
    name: Terraform Validate
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Format
        run: terraform fmt -check
      - name: Terraform Init
        run: terraform init -backend=false
      - name: Terraform Validate
        run: terraform validate -no-color

  plan:
    name: Terraform Plan
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    env:
      OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
    steps:
      - name: Check OIDC Configuration
        id: check
        run: |
          if [ -z "$OIDC_ROLE_ARN" ]; then
            echo "::warning::AWS_OIDC_ROLE_ARN secret not configured — skipping plan (expected during initial bootstrap)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'
      - uses: hashicorp/setup-terraform@v3
        if: steps.check.outputs.skip != 'true'
      - uses: autero1/action-terragrunt@v3
        if: steps.check.outputs.skip != 'true'
        with:
          terragrunt-version: latest
      - name: Configure AWS Credentials
        if: steps.check.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-2
      - name: Terragrunt Init
        if: steps.check.outputs.skip != 'true'
        run: terragrunt init
      - name: Terragrunt Plan
        if: steps.check.outputs.skip != 'true'
        id: plan
        run: terragrunt plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        env:
          TF_VAR_license_key: ${{ secrets.RUNSON_LICENSE }}
      - name: Post Plan to PR
        if: steps.check.outputs.skip != 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8').slice(-60000);
            const output = `#### Terraform Plan
            <details><summary>Show Plan</summary>

            \`\`\`
            ${plan}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  gate:
    name: Merge Gate
    needs: [changes, validate, plan]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          allowed-skips: validate, plan
          jobs: ${{ toJSON(needs) }}
